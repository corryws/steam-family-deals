<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmigelsWild</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #171a21;
    --surface:  #232730;
    --surface2: #292e37;
    --border:   rgba(255,255,255,0.08);
    --accent:   #66c0f4;
    --accent-dim: rgba(102,192,244,0.15);
    --text:     #c6d4df;
    --text-bright: #e8f0f5;
    --muted:    #adadad;
    --green:    #a3cf6f;
    --green-dim: rgba(163,207,111,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { scroll-behavior:smooth; }
  body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; overscroll-behavior-y:contain; }

  /* PULL TO REFRESH */
  #ptr-indicator { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; align-items:center; justify-content:center; gap:10px; background:var(--surface2); border-bottom:1px solid var(--border); padding:12px; font-size:0.82rem; color:var(--muted); transform:translateY(-100%); transition:transform 0.25s ease; pointer-events:none; }
  #ptr-indicator.visible { transform:translateY(0); }
  #ptr-indicator.releasing { color:var(--accent); }
  .ptr-arrow { font-size:1.2rem; transition:transform 0.25s; }
  #ptr-indicator.releasing .ptr-arrow { transform:rotate(180deg); }

  .container { max-width:980px; margin:0 auto; padding:2rem 1rem; }

  /* HEADER */
  header { text-align:center; margin-bottom:2.5rem; padding-bottom:2rem; border-bottom:1px solid var(--border); }
  .header-logo { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:4px; }
  .steam-icon { width:32px; height:32px; opacity:0.7; }
  h1 { font-family:'Rajdhani',sans-serif; font-size:2.6rem; font-weight:700; letter-spacing:3px; color:var(--text-bright); text-transform:uppercase; }
  .subtitle { color:var(--muted); font-size:0.8rem; letter-spacing:1.5px; text-transform:uppercase; margin-top:2px; }
  .updated-text { color:var(--muted); font-size:0.72rem; margin-top:6px; min-height:16px; }

  /* STATS */
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:0.6rem; margin-bottom:1.5rem; }
  .stat { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.85rem 0.75rem; text-align:center; }
  .stat-number { font-family:'Rajdhani',sans-serif; font-size:1.9rem; font-weight:700; color:var(--accent); line-height:1; }
  .stat-label { font-size:0.65rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:3px; }

  /* SCAN BAR */
  .scan-bar { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:0.9rem 1.1rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:1rem; }
  .scan-bar.hidden { display:none; }
  .scan-info { flex:1; }
  .scan-message { font-size:0.8rem; color:var(--text); margin-bottom:6px; }
  .scan-track { height:2px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .scan-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.5s ease; width:0%; }
  .scan-pct { font-family:'Rajdhani',sans-serif; font-size:0.9rem; color:var(--muted); white-space:nowrap; }
  .scan-spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* SECTION TITLE */
  .section-title { font-family:'Rajdhani',sans-serif; font-size:0.75rem; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); margin-bottom:0.75rem; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* MEMBERS */
  .members-row { display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.25rem; }
  .member-chip { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:5px 12px 5px 5px; cursor:pointer; transition:border-color 0.2s, background 0.2s; font-size:0.8rem; user-select:none; color:var(--muted); }
  .member-chip:hover { border-color:rgba(102,192,244,0.4); color:var(--text); }
  .member-chip.active { border-color:var(--accent); background:var(--accent-dim); color:var(--accent); }
  .chip-avatar { width:24px; height:24px; border-radius:3px; object-fit:cover; background:var(--surface2); flex-shrink:0; }
  .chip-initials { width:24px; height:24px; border-radius:3px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-family:'Rajdhani',sans-serif; font-size:0.65rem; font-weight:700; color:var(--accent); flex-shrink:0; }

  /* FILTERS */
  .filters-bar { display:flex; gap:0.5rem; align-items:center; margin-bottom:1.25rem; flex-wrap:wrap; }
  .filter-group { display:flex; gap:0.3rem; }
  .filter-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:0.75rem; padding:4px 11px; border-radius:4px; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .filter-btn:hover { border-color:var(--accent); color:var(--text); }
  .filter-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .search-input { background:var(--surface); border:1px solid var(--border); color:var(--text-bright); font-family:'Inter',sans-serif; font-size:0.8rem; padding:4px 11px; border-radius:4px; outline:none; transition:border-color 0.15s; width:190px; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .results-count { margin-left:auto; font-size:0.72rem; color:var(--muted); }

  /* GAME CARDS */
  .games-grid { display:grid; gap:2px; }
  .game-card { background:var(--surface); border:1px solid transparent; border-radius:4px; padding:0.6rem 0.75rem; display:grid; grid-template-columns:120px 1fr auto; align-items:center; gap:0.85rem; text-decoration:none; color:inherit; transition:background 0.15s, border-color 0.15s; }
  .game-card:hover { background:var(--surface2); border-color:var(--border); }
  .game-card.multi { border-left:2px solid var(--green); }
  .game-card.full-price { opacity:0.5; }
  .game-card.full-price:hover { opacity:0.85; }
  .game-img { width:120px; height:45px; border-radius:3px; object-fit:cover; background:var(--surface2); flex-shrink:0; display:block; }
  .game-info { min-width:0; }
  .game-header { display:flex; align-items:center; gap:6px; margin-bottom:5px; flex-wrap:wrap; }
  .game-name { font-size:0.88rem; font-weight:500; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:400px; }
  .want-badge { background:var(--green-dim); color:var(--green); font-size:0.65rem; padding:1px 7px; border-radius:3px; font-weight:500; white-space:nowrap; flex-shrink:0; }
  .owners { display:flex; gap:3px; flex-wrap:wrap; }
  .owner-avatar { width:18px; height:18px; border-radius:2px; object-fit:cover; background:var(--surface2); }
  .owner-initials { width:18px; height:18px; border-radius:2px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:7px; font-weight:600; color:var(--accent); }
  .price-block { text-align:right; flex-shrink:0; min-width:70px; }
  .discount-badge { font-family:'Rajdhani',sans-serif; font-size:0.85rem; font-weight:700; color:var(--green); }
  .price-final { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text-bright); }
  .price-final.dimmed { font-size:0.95rem; color:var(--muted); font-weight:400; }
  .price-original { font-size:0.68rem; color:var(--muted); text-decoration:line-through; }

  /* PAGINATION */
  .pagination { display:flex; align-items:center; justify-content:center; gap:0.4rem; margin-top:1rem; flex-wrap:wrap; }
  .page-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:0.78rem; padding:4px 10px; border-radius:4px; cursor:pointer; transition:all 0.15s; min-width:32px; }
  .page-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--text); }
  .page-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .page-btn:disabled { opacity:0.3; cursor:default; }
  .page-info { font-size:0.75rem; color:var(--muted); padding:0 4px; }
  .per-page-select { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:0.75rem; padding:3px 7px; border-radius:4px; cursor:pointer; outline:none; margin-left:0.75rem; }

  /* TOGGLE + ACTIONS */
  .bottom-bar { display:flex; align-items:center; gap:0.75rem; margin-top:1.75rem; flex-wrap:wrap; }
  .toggle-full-btn, .refresh-btn { background:var(--surface); border:1px solid var(--border); color:var(--muted); font-family:'Inter',sans-serif; font-size:0.78rem; padding:5px 14px; border-radius:4px; cursor:pointer; transition:all 0.15s; }
  .toggle-full-btn:hover, .refresh-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--text); }
  .toggle-full-btn.active { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .refresh-btn:disabled { opacity:0.35; cursor:default; }
  .refresh-btn { margin-left:auto; }

  /* MISC */
  .no-results { text-align:center; padding:2.5rem; color:var(--muted); font-size:0.85rem; }
  .empty-state { text-align:center; padding:3rem; color:var(--muted); }
  .empty-state p { margin-bottom:1rem; font-size:0.9rem; }
  .hidden { display:none !important; }
  .fade-in { animation:fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:translateY(0); } }
  .divider { height:1px; background:var(--border); margin:1.5rem 0; }

  @media (max-width:600px) {
    .stats-bar { grid-template-columns:repeat(2,1fr); }
    .game-card { grid-template-columns:90px 1fr auto; gap:0.5rem; }
    .game-img { width:90px; height:34px; }
    .game-name { font-size:0.8rem; max-width:160px; }
    .search-input { width:100%; }
    .results-count { margin-left:0; }
    h1 { font-size:2rem; }
  }
</style>
</head>
<body>

<div id="ptr-indicator">
  <span class="ptr-arrow">↓</span>
  <span id="ptr-text">Trascina per aggiornare</span>
</div>

<div class="container">
  <header>
    <div class="header-logo">
      <svg class="steam-icon" viewBox="0 0 24 24" fill="var(--accent)"><path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.606 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.497 1.009 2.455-.397.957-1.497 1.41-2.455 1.012H7.54zm11.415-9.303c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.252 0-2.265-1.014-2.265-2.265z"/></svg>
      <h1>SmigelsWild</h1>
    </div>
    <p class="subtitle">Offerte sulle wishlist del gruppo</p>
    <p class="updated-text" id="updated-text"></p>
  </header>

  <div class="stats-bar">
    <div class="stat"><div class="stat-number" id="stat-members">6</div><div class="stat-label">Membri</div></div>
    <div class="stat"><div class="stat-number" id="stat-total">—</div><div class="stat-label">Wishlist</div></div>
    <div class="stat"><div class="stat-number" id="stat-deals">—</div><div class="stat-label">In offerta</div></div>
    <div class="stat"><div class="stat-number" id="stat-full">—</div><div class="stat-label">Prezzo pieno</div></div>
  </div>

  <div class="scan-bar hidden" id="scan-bar">
    <div class="scan-spinner"></div>
    <div class="scan-info">
      <div class="scan-message" id="scan-message">Avvio...</div>
      <div class="scan-track"><div class="scan-fill" id="scan-fill"></div></div>
    </div>
    <div class="scan-pct" id="scan-pct">0%</div>
  </div>

  <p class="section-title">Membri del gruppo</p>
  <div class="members-row" id="members-row"></div>

  <div class="filters-bar">
    <div class="filter-group">
      <button class="filter-btn active" data-sort="discount">% Sconto ↓</button>
      <button class="filter-btn" data-sort="price-asc">Prezzo ↑</button>
      <button class="filter-btn" data-sort="price-desc">Prezzo ↓</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-min="0">Tutti</button>
      <button class="filter-btn" data-min="30">≥30%</button>
      <button class="filter-btn" data-min="50">≥50%</button>
      <button class="filter-btn" data-min="75">≥75%</button>
    </div>
    <input class="search-input" type="text" id="search-input" placeholder="Cerca gioco...">
    <span class="results-count" id="results-count"></span>
  </div>

  <p class="section-title">Offerte trovate</p>
  <div class="games-grid" id="games-grid"></div>
  <div class="no-results hidden" id="no-results">Nessun gioco corrisponde ai filtri</div>
  <div class="empty-state hidden" id="empty-state">
    <p>Nessun dato disponibile.</p>
    <button class="refresh-btn" id="start-scan-btn" style="margin:0 auto;display:block">Avvia prima scansione</button>
  </div>
  <div class="pagination hidden" id="pagination"></div>

  <div class="bottom-bar">
    <p class="section-title" style="margin:0;flex:1">Resto della wishlist</p>
    <button class="toggle-full-btn hidden" id="toggle-full-btn">▶ Mostra tutti</button>
    <button class="refresh-btn" id="refresh-btn">↺ Aggiorna ora</button>
  </div>

  <div id="full-section" class="hidden" style="margin-top:0.75rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem">
      <span class="results-count" id="full-count"></span>
    </div>
    <div class="games-grid" id="full-grid"></div>
    <div class="no-results hidden" id="full-no-results">Nessun gioco corrisponde ai filtri</div>
    <div class="pagination hidden" id="full-pagination"></div>
  </div>

  <div style="height:2rem"></div>
</div>

<script>
const state = {
  deals: [], fullGames: [], members: [], counts: {},
  activeMembers: new Set(),
  sortBy: 'discount', minDiscount: 0, search: '',
  page: 1, fullPage: 1, perPage: 25,
  showFull: false, scanning: false, pollTimer: null,
};

const $ = id => document.getElementById(id);
const parsePrice = s => s ? parseFloat(s.replace(/[^\d,]/g,'').replace(',','.')) || Infinity : Infinity;

function sorted(games) {
  return [...games].sort((a,b) => {
    if (state.sortBy==='discount') return b.discount_percent - a.discount_percent;
    if (state.sortBy==='price-asc') return parsePrice(a.final_price) - parsePrice(b.final_price);
    if (state.sortBy==='price-desc') return parsePrice(b.final_price) - parsePrice(a.final_price);
    return 0;
  });
}

function filtered(games) {
  const q = state.search.toLowerCase();
  return games.filter(g => {
    if (g.discount_percent < state.minDiscount) return false;
    if (state.activeMembers.size > 0 && ![...state.activeMembers].some(id => g.members.some(m => m.id===id))) return false;
    if (q && !g.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

function filteredFull() {
  const q = state.search.toLowerCase();
  return state.fullGames.filter(g => {
    if (state.activeMembers.size > 0 && ![...state.activeMembers].some(id => g.members.some(m => m.id===id))) return false;
    if (q && !g.name.toLowerCase().includes(q)) return false;
    return true;
  });
}

// Trova profilo membro per ID
function getMember(id) {
  return state.members.find(m => m.id === id) || null;
}

function avatarHTML(member, size=18, radius=2) {
  if (member?.avatar) {
    return `<img class="owner-avatar" src="${member.avatar}" title="${member.displayName||member.name}" style="width:${size}px;height:${size}px;border-radius:${radius}px" onerror="this.style.display='none'">`;
  }
  return `<div class="owner-initials" style="width:${size}px;height:${size}px;border-radius:${radius}px" title="${member?.name||''}">${member?.initials?.[0]||'?'}</div>`;
}

function gameCardHTML(g, full=false) {
  const owners = g.members.map(m => {
    const profile = getMember(m.id);
    return avatarHTML(profile||m, 18, 2);
  }).join('');
  const multi = g.members.length >= 2;
  const placeholder = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='45'><rect width='120' height='45' fill='%23292e37'/></svg>`;
  const price = full
    ? `<div class="price-block"><div class="price-final dimmed">${g.final_price||(g.is_free?'Gratis':'—')}</div></div>`
    : `<div class="price-block"><div class="discount-badge">-${g.discount_percent}%</div><div class="price-final">${g.final_price||'—'}</div><div class="price-original">${g.original_price||''}</div></div>`;
  return `<a class="game-card ${multi?'multi':''} ${full?'full-price':''} fade-in"
    href="https://store.steampowered.com/app/${g.id}" target="_blank" rel="noopener">
    <img class="game-img" src="${g.image}" alt="" onerror="this.src='${placeholder}'">
    <div class="game-info">
      <div class="game-header">
        <span class="game-name" title="${g.name}">${g.name}</span>
        ${multi?`<span class="want-badge">${g.members.length} lo vogliono</span>`:''}
      </div>
      <div class="owners">${owners}</div>
    </div>
    ${price}
  </a>`;
}

function renderPagination(elId, cur, total, onPage) {
  const el = $(elId);
  if (total <= 1) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const pages = new Set([1,total,cur,cur-1,cur+1].filter(p=>p>=1&&p<=total));
  const ps = [...pages].sort((a,b)=>a-b);
  let html = `<button class="page-btn" data-action="prev" ${cur===1?'disabled':''}>&#8592;</button>`;
  let prev=0;
  for (const p of ps) {
    if (p-prev>1) html+=`<span class="page-info">…</span>`;
    html+=`<button class="page-btn ${p===cur?'active':''}" data-page="${p}">${p}</button>`;
    prev=p;
  }
  html+=`<button class="page-btn" data-action="next" ${cur===total?'disabled':''}>&#8594;</button>`;
  html+=`<select class="per-page-select" id="${elId}-pp">${[10,25,50,100].map(n=>`<option value="${n}" ${state.perPage===n?'selected':''}>${n}/pag</option>`).join('')}</select>`;
  el.innerHTML=html;
  el.querySelector('[data-action="prev"]')?.addEventListener('click',()=>onPage(cur-1));
  el.querySelector('[data-action="next"]')?.addEventListener('click',()=>onPage(cur+1));
  el.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>onPage(parseInt(b.dataset.page))));
  el.querySelector(`#${elId}-pp`)?.addEventListener('change',e=>{ state.perPage=parseInt(e.target.value); state.page=1; state.fullPage=1; renderAll(); });
}

function renderDeals() {
  const all = sorted(filtered(state.deals));
  const tp = Math.max(1,Math.ceil(all.length/state.perPage));
  if (state.page>tp) state.page=tp;
  const page = all.slice((state.page-1)*state.perPage, state.page*state.perPage);
  $('games-grid').innerHTML = page.map(g=>gameCardHTML(g)).join('');
  $('no-results').classList.toggle('hidden', all.length>0||state.deals.length===0);
  $('empty-state').classList.toggle('hidden', state.deals.length>0||state.fullGames.length>0);
  $('results-count').textContent = all.length>0 ? `${all.length} risultati` : '';
  renderPagination('pagination', state.page, tp, p=>{state.page=p;renderDeals();});
}

function renderFull() {
  const btn = $('toggle-full-btn');
  btn.classList.toggle('hidden', state.fullGames.length===0);
  if (!state.showFull||state.fullGames.length===0) { $('full-section').classList.add('hidden'); return; }
  $('full-section').classList.remove('hidden');
  const all = filteredFull();
  const tp = Math.max(1,Math.ceil(all.length/state.perPage));
  if (state.fullPage>tp) state.fullPage=tp;
  const page = all.slice((state.fullPage-1)*state.perPage, state.fullPage*state.perPage);
  $('full-grid').innerHTML = page.map(g=>gameCardHTML(g,true)).join('');
  $('full-no-results').classList.toggle('hidden', all.length>0);
  $('full-count').textContent = `${all.length} giochi a prezzo pieno`;
  renderPagination('full-pagination', state.fullPage, tp, p=>{state.fullPage=p;renderFull();});
}

function renderMembers() {
  $('members-row').innerHTML = state.members.map(m => {
    const active = state.activeMembers.has(m.id);
    const av = m.avatar
      ? `<img class="chip-avatar" src="${m.avatar}" onerror="this.style.display='none'">`
      : `<div class="chip-initials">${m.initials}</div>`;
    const count = state.counts[m.name]!==undefined ? ` (${state.counts[m.name]})` : '';
    return `<div class="member-chip ${active?'active':''}" data-id="${m.id}">${av}<span>${m.displayName||m.name}${count}</span></div>`;
  }).join('');
  $('members-row').querySelectorAll('.member-chip').forEach(chip =>
    chip.addEventListener('click', () => {
      const id = chip.dataset.id;
      state.activeMembers.has(id) ? state.activeMembers.delete(id) : state.activeMembers.add(id);
      state.page=1; state.fullPage=1; renderAll();
    })
  );
}

function renderStats() {
  $('stat-total').textContent = state.deals.length+state.fullGames.length||'—';
  $('stat-deals').textContent = state.deals.length||'—';
  $('stat-full').textContent  = state.fullGames.length||'—';
}

function renderAll() { renderMembers(); renderStats(); renderDeals(); renderFull(); }

function updateScanBar(scan) {
  const bar = $('scan-bar');
  if (!scan.running) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  const pct = scan.total>0 ? Math.round(scan.checked/scan.total*100) : 0;
  $('scan-message').textContent = scan.message||'Scansione in corso...';
  $('scan-fill').style.width = pct+'%';
  $('scan-pct').textContent = pct+'%';
  $('refresh-btn').disabled = true;
}

async function poll() {
  try {
    const r = await fetch('/api/scan/status');
    const scan = await r.json();
    updateScanBar(scan);
    if (!scan.running) {
      clearInterval(state.pollTimer); state.pollTimer=null; state.scanning=false;
      $('refresh-btn').disabled=false;
      if (scan.status==='done') await loadData();
      if (scan.status==='error') {
        $('scan-bar').classList.remove('hidden');
        $('scan-message').textContent='❌ '+scan.message;
        setTimeout(()=>$('scan-bar').classList.add('hidden'),5000);
      }
    }
  } catch(e) {}
}

function startPolling() {
  if (state.pollTimer) return;
  state.scanning=true; $('refresh-btn').disabled=true;
  state.pollTimer=setInterval(poll,2500); poll();
}

async function loadData() {
  try {
    const r = await fetch('/api/data');
    const {cache, scan} = await r.json();
    if (cache) {
      state.deals = cache.discounted||[];
      state.fullGames = cache.fullPrice||[];
      state.counts = cache.counts||{};
      // Aggiorna avatar dai profili salvati in cache
      if (cache.profiles) {
        cache.profiles.forEach(p => {
          const m = state.members.find(m=>m.id===p.id);
          if (m) { m.avatar=p.avatar; m.displayName=p.displayName; }
        });
      }
      if (cache.updatedAt) {
        const d=new Date(cache.updatedAt);
        $('updated-text').textContent=`Aggiornato il ${d.toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})} alle ${d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}`;
      }
    }
    renderAll();
    updateScanBar(scan);
    if (scan.running) startPolling();
    else if (!cache) startScan();
  } catch(e) { console.error('Errore caricamento:',e); }
}

async function startScan() {
  try { await fetch('/api/scan',{method:'POST'}); startPolling(); } catch(e) {}
}

// Pull to refresh
(function() {
  let startY=0, pulling=false;
  const THRESHOLD=80;
  const ind=$('ptr-indicator');
  document.addEventListener('touchstart',e=>{ if(window.scrollY===0&&!state.scanning){startY=e.touches[0].clientY;pulling=true;} },{passive:true});
  document.addEventListener('touchmove',e=>{ if(!pulling)return; const dy=e.touches[0].clientY-startY; if(dy>10){ind.classList.add('visible'); $('ptr-text').textContent=dy>THRESHOLD?'Rilascia per aggiornare':'Trascina per aggiornare'; ind.classList.toggle('releasing',dy>THRESHOLD);} },{passive:true});
  document.addEventListener('touchend',e=>{ if(!pulling)return; pulling=false; const dy=e.changedTouches[0].clientY-startY; ind.classList.remove('visible','releasing'); if(dy>THRESHOLD&&!state.scanning)startScan(); });
})();

async function init() {
  const members = await (await fetch('/api/members')).json();
  state.members = members;

  document.querySelectorAll('[data-sort]').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('[data-sort]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.sortBy=btn.dataset.sort; state.page=1; renderDeals(); }));
  document.querySelectorAll('[data-min]').forEach(btn=>btn.addEventListener('click',()=>{ document.querySelectorAll('[data-min]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); state.minDiscount=parseInt(btn.dataset.min); state.page=1; renderDeals(); }));
  $('search-input').addEventListener('input',e=>{ state.search=e.target.value; state.page=1; state.fullPage=1; renderDeals(); renderFull(); });
  $('toggle-full-btn').addEventListener('click',()=>{ state.showFull=!state.showFull; $('toggle-full-btn').classList.toggle('active',state.showFull); $('toggle-full-btn').textContent=state.showFull?'▼ Nascondi':'▶ Mostra tutti'; renderFull(); });
  $('refresh-btn').addEventListener('click',startScan);
  $('start-scan-btn')?.addEventListener('click',startScan);

  await loadData();
}

init();
</script>
</body>
</html>
